<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>내 주변 병원 찾기 (카카오맵 SDK)</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet"/>
<style>
:root{
  --red:#E8392A; --red-light:#FF6B5B; --red-pale:#FFF0EE;
  --dark:#1A1A2E; --mid:#2D2D44; --gray:#8B8B9E;
  --light:#F4F5F9; --white:#FFFFFF;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--light);color:var(--dark);min-height:100vh;display:flex;flex-direction:column;}
header{background:var(--dark);color:var(--white);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;}
.logo{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:900;}
.logo-icon{width:32px;height:32px;background:var(--red);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;}

.app-wrap{display:flex;flex:1;overflow:hidden;}
.side{width:340px;min-width:300px;background:var(--white);display:flex;flex-direction:column;overflow-y:auto;box-shadow:2px 0 16px rgba(0,0,0,0.06);}
.search-box{padding:16px 18px;border-bottom:1px solid #EEEEF3;}
.search-title{font-size:12px;font-weight:700;color:var(--gray);margin-bottom:10px;text-transform:uppercase;letter-spacing:1px;}
.keyword-row{display:flex;gap:8px;margin-bottom:10px;}
.keyword-input{flex:1;border:2px solid #EEEEF3;border-radius:10px;padding:9px 12px;font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none;}
.keyword-input:focus{border-color:var(--red);}
.btn-search{background:var(--red);color:white;border:none;border-radius:10px;padding:9px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.cat-row{display:flex;gap:6px;flex-wrap:wrap;}
.cat-btn{border:1.5px solid #EEEEF3;background:white;border-radius:18px;padding:5px 11px;font-size:12px;font-weight:500;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.cat-btn.active,.cat-btn:hover{background:var(--red);border-color:var(--red);color:white;}
.location-bar{padding:12px 18px;border-bottom:1px solid #EEEEF3;}
.btn-location{width:100%;background:var(--dark);color:white;border:none;border-radius:10px;padding:11px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.btn-location:disabled{opacity:0.6;}
.result-count{padding:12px 18px 6px;font-size:12px;color:var(--gray);font-weight:600;}
.hosp-list{flex:1;overflow-y:auto;padding:0 12px 16px;}
.hosp-card{background:white;border:1.5px solid #EEEEF3;border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:all .15s;}
.hosp-card:hover{border-color:var(--red-light);}
.hosp-card.active{border-color:var(--red);background:var(--red-pale);}
.hosp-name{font-size:14px;font-weight:700;margin-bottom:3px;}
.hosp-addr{font-size:11.5px;color:var(--gray);margin-bottom:6px;}
.hosp-dist{display:inline-block;background:var(--red-pale);color:var(--red);font-size:11px;font-weight:700;padding:2px 8px;border-radius:14px;margin-bottom:6px;}
.hosp-actions a{display:inline-block;background:var(--red);color:white;font-size:11.5px;font-weight:700;padding:4px 10px;border-radius:6px;text-decoration:none;margin-right:6px;}
#map{flex:1;background:#E5E7EB;display:flex;align-items:center;justify-content:center;color:var(--gray);font-size:14px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--dark);color:white;padding:11px 20px;border-radius:24px;font-size:13px;z-index:9999;transition:transform .3s;white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis;}
.toast.show{transform:translateX(-50%) translateY(0);}

/* ── 드래그 핸들 ── */
.drag-handle{display:none;width:100%;padding:9px 0 6px;justify-content:center;align-items:center;cursor:grab;touch-action:none;background:var(--white);flex-shrink:0;}
.drag-handle:active{cursor:grabbing;}
.drag-bar{width:42px;height:5px;border-radius:3px;background:#D8D8E2;}

/* ── 모바일 반응형 ── */
@media (max-width: 700px){
  header{padding:0 14px;height:52px;}
  .logo{font-size:15px;}
  .logo-icon{width:26px;height:26px;font-size:13px;}
  header > span{display:none;}

  .app-wrap{flex-direction:column;height:calc(100vh - 52px);overflow:hidden;}
  .side{width:100%;min-width:unset;height:42vh;flex:none;order:2;box-shadow:0 -2px 12px rgba(0,0,0,.08);}
  #map{flex:1;order:1;min-height:0;}
  .drag-handle{display:flex;}

  .search-box{padding:12px 14px;}
  .cat-row{gap:5px;}
  .cat-btn{font-size:11px;padding:4px 9px;}
  .keyword-input{font-size:13px;}

  .hosp-actions a{font-size:11px;padding:4px 8px;margin-right:4px;margin-bottom:4px;}
}
@media (max-width: 420px){
  .side{height:48vh;}
}
</style>
</head>
<body>

<header>
  <div class="logo"><div class="logo-icon">🏥</div>내 주변 병원 찾기</div>
  <span style="font-size:11px;color:var(--gray)">현재 위치 기반 병원 탐색</span>
</header>

<div class="app-wrap">
  <div class="side">
    <div class="drag-handle" id="dragHandle"><div class="drag-bar"></div></div>
    <div class="search-box">
      <div class="search-title">🔍 병원 검색</div>
      <div class="keyword-row">
        <input class="keyword-input" id="keywordInput" type="text" placeholder="병원명/진료과 입력" onkeydown="if(event.key==='Enter') doSearch()"/>
        <button class="btn-search" onclick="doSearch()">검색</button>
      </div>
      <div class="cat-row">
        <button class="cat-btn active" onclick="setCat(this,'병원')">전체</button>
        <button class="cat-btn" onclick="setCat(this,'내과')">내과</button>
        <button class="cat-btn" onclick="setCat(this,'정형외과')">정형외과</button>
        <button class="cat-btn" onclick="setCat(this,'소아과')">소아과</button>
        <button class="cat-btn" onclick="setCat(this,'치과')">치과</button>
        <button class="cat-btn" onclick="setCat(this,'약국')">약국</button>
        <button class="cat-btn" onclick="setCat(this,'응급실')">응급실</button>
      </div>
    </div>
    <div class="location-bar">
      <button class="btn-location" id="locBtn" onclick="getMyLocation()">📍 내 현재 위치에서 검색</button>
    </div>
    <div class="result-count" id="resultCount">지도를 불러오는 중...</div>
    <div class="hosp-list" id="hospList"></div>
  </div>
  <div id="map">⏳ 지도를 불러오는 중...</div>
</div>

<div class="toast" id="toast"></div>

<script>
// 카카오 JavaScript 키
const KAKAO_JS_KEY = 'ddc452aef0404eb6af92d8a14dc6d285';

let map=null, markers=[], infowindow=null, ps=null;
let currentCat='병원', currentLat=null, currentLng=null;

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),4000);
}

function loadMap(){
  const key = KAKAO_JS_KEY;
  document.getElementById('map').innerHTML = '⏳ 지도를 불러오는 중...';

  const old = document.getElementById('kakaoSdk');
  if(old) old.remove();

  const script = document.createElement('script');
  script.id = 'kakaoSdk';
  script.src = `https://dapi.kakao.com/v2/maps/sdk.js?appkey=${key}&libraries=services&autoload=false`;

  script.onload = () => {
    if (typeof kakao === 'undefined' || !kakao.maps) {
      console.error('카카오맵 SDK 로드 실패: kakao.maps 객체 없음');
      document.getElementById('map').innerHTML = '❌ 지도 로드 실패';
      return;
    }
    try {
      kakao.maps.load(() => {
        try{ initMap(); }
        catch(e){ console.error('지도 초기화 오류:', e); }
      });
    } catch(e) {
      console.error('kakao.maps.load 오류:', e);
    }
  };

  script.onerror = () => {
    console.error('카카오맵 SDK 스크립트 로드 실패 (네트워크/도메인 문제)');
    document.getElementById('map').innerHTML = '❌ 지도 로드 실패 (콘솔 확인)';
    showToast('지도를 불러오지 못했어요. 잠시 후 새로고침 해보세요.');
  };

  document.head.appendChild(script);
}

// 페이지 로드 시 자동으로 지도 불러오기
loadMap();


function initMap(){
  document.getElementById('map').innerHTML = '';
  const container = document.getElementById('map');
  map = new kakao.maps.Map(container, { center: new kakao.maps.LatLng(35.1795,129.0756), level:4 });
  infowindow = new kakao.maps.InfoWindow({zIndex:1});
  ps = new kakao.maps.services.Places();
  document.getElementById('resultCount').textContent = '위치 검색을 눌러보세요';
  showToast('🎉 지도 로드 완료!');
}

function setCat(btn,cat){
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentCat = cat;
  if(currentLat && currentLng) searchNearby(currentLat,currentLng);
}

function getMyLocation(){
  if(!map){ showToast('먼저 지도를 불러와주세요'); return; }
  const btn=document.getElementById('locBtn');
  btn.disabled=true; btn.textContent='⏳ 위치 확인 중...';
  if(!navigator.geolocation){ showToast('위치 서비스 미지원 브라우저'); resetBtn(); return; }
  navigator.geolocation.getCurrentPosition(
    pos=>{
      currentLat=pos.coords.latitude; currentLng=pos.coords.longitude;
      const ll=new kakao.maps.LatLng(currentLat,currentLng);
      map.setCenter(ll); map.setLevel(4);
      addMyMarker(ll);
      searchNearby(currentLat,currentLng);
      resetBtn();
    },
    err=>{ showToast('위치 권한이 거부되었습니다'); resetBtn(); },
    {enableHighAccuracy:true,timeout:10000}
  );
}
function resetBtn(){
  const btn=document.getElementById('locBtn');
  btn.disabled=false; btn.textContent='📍 내 현재 위치에서 검색';
}
function addMyMarker(ll){
  const content = `<div style="width:18px;height:18px;background:#E8392A;border:3px solid white;border-radius:50%;box-shadow:0 2px 8px rgba(232,57,42,.5)"></div>`;
  new kakao.maps.CustomOverlay({position:ll, content, zIndex:10}).setMap(map);
}
function doSearch(){
  const kw=document.getElementById('keywordInput').value.trim();
  if(currentLat&&currentLng) searchNearby(currentLat,currentLng,kw||currentCat);
  else { const c=map.getCenter(); searchNearby(c.getLat(),c.getLng(),kw||currentCat); }
}
function searchNearby(lat,lng,keyword){
  if(!ps) return;
  document.getElementById('resultCount').textContent='검색 중...';
  ps.keywordSearch(keyword||currentCat, (data,status)=>{
    clearMarkers();
    if(status===kakao.maps.services.Status.OK){
      renderList(data); addMarkers(data);
      document.getElementById('resultCount').innerHTML = `<strong style="color:#E8392A">${data.length}개</strong> 검색됨`;
    } else {
      document.getElementById('hospList').innerHTML='<div style="padding:20px;text-align:center;color:#8B8B9E;font-size:13px">검색 결과가 없습니다</div>';
      document.getElementById('resultCount').textContent='결과 없음';
    }
  }, { location:new kakao.maps.LatLng(lat,lng), radius:2000, sort:kakao.maps.services.SortBy.DISTANCE });
}
function addMarkers(places){
  const bounds=new kakao.maps.LatLngBounds();
  places.forEach((p,i)=>{
    const ll=new kakao.maps.LatLng(p.y,p.x);
    const marker=new kakao.maps.Marker({map,position:ll});
    markers.push(marker); bounds.extend(ll);
    kakao.maps.event.addListener(marker,'click',()=>{
      infowindow.setContent(`<div style="padding:8px 12px;font-size:13px"><b>${p.place_name}</b><br><span style="color:#8B8B9E;font-size:11px">${p.road_address_name||p.address_name}</span></div>`);
      infowindow.open(map,marker);
      highlightCard(i);
    });
  });
  if(currentLat&&currentLng) bounds.extend(new kakao.maps.LatLng(currentLat,currentLng));
  map.setBounds(bounds);
}
function clearMarkers(){
  markers.forEach(m=>m.setMap(null)); markers=[];
  if(infowindow) infowindow.close();
}
function renderList(places){
  document.getElementById('hospList').innerHTML = places.map((p,i)=>{
    const dist = p.distance ? (p.distance>=1000 ? (p.distance/1000).toFixed(1)+'km' : p.distance+'m') : '';
    const navi = `https://map.kakao.com/link/to/${p.place_name},${p.y},${p.x}`;
    return `<div class="hosp-card" id="card-${i}" onclick="focusPlace(${i},${p.y},${p.x})">
      ${dist?`<span class="hosp-dist">📍 ${dist}</span>`:''}
      <div class="hosp-name">${p.place_name}</div>
      <div class="hosp-addr">${p.road_address_name||p.address_name}</div>
      <div class="hosp-actions">
        <a href="${navi}" target="_blank" onclick="event.stopPropagation()">🗺️ 길찾기</a>
        ${p.phone?`<a href="tel:${p.phone}" onclick="event.stopPropagation()">📞 ${p.phone}</a>`:''}
      </div>
    </div>`;
  }).join('');
}
function focusPlace(i,lat,lng){
  map.setCenter(new kakao.maps.LatLng(lat,lng)); map.setLevel(3);
  if(markers[i]) kakao.maps.event.trigger(markers[i],'click');
  highlightCard(i);
}
function highlightCard(i){
  document.querySelectorAll('.hosp-card').forEach(c=>c.classList.remove('active'));
  const c=document.getElementById('card-'+i); if(c) c.classList.add('active');
}

// ── 모바일 바텀시트 드래그 (병원 목록 영역 크기 조절) ──
(function(){
  const handle = document.getElementById('dragHandle');
  const sideEl = document.querySelector('.side');
  let dragging = false, startY = 0, startHeight = 0;
  let snapMin = 0, snapMid = 0, snapMax = 0;

  function clamp(v, min, max){ return Math.max(min, Math.min(max, v)); }

  function computeSnaps(){
    const headerH = document.querySelector('header').offsetHeight;
    const availableH = window.innerHeight - headerH;
   
    snapMin = Math.max(availableH * 0.18, 150);
    snapMid = availableH * 0.42;
    snapMax = availableH * 0.85;
  }

  function onDown(e){
    if(window.innerWidth > 700) return;
    computeSnaps();
    dragging = true;
    startY = e.clientY;
    startHeight = sideEl.getBoundingClientRect().height;
    sideEl.style.transition = 'none';
    try{ handle.setPointerCapture(e.pointerId); }catch(err){}
    document.body.style.userSelect = 'none';
  }
  function onMove(e){
    if(!dragging) return;
    const delta = startY - e.clientY; 
    const newHeight = clamp(startHeight + delta, snapMin, snapMax);
    sideEl.style.height = newHeight + 'px';
  }
  function onUp(e){
    if(!dragging) return;
    dragging = false;
    document.body.style.userSelect = '';
    try{ handle.releasePointerCapture(e.pointerId); }catch(err){}

    // 가장 가까운 스냅 위치
    const cur = sideEl.getBoundingClientRect().height;
    const points = [snapMin, snapMid, snapMax];
    let nearest = points[0];
    let minDiff = Math.abs(cur - points[0]);
    for(const p of points){
      const diff = Math.abs(cur - p);
      if(diff < minDiff){ minDiff = diff; nearest = p; }
    }
    sideEl.style.transition = 'height .25s ease';
    sideEl.style.height = nearest + 'px';
  }

  handle.addEventListener('pointerdown', onDown);
  handle.addEventListener('pointermove', onMove);
  handle.addEventListener('pointerup', onUp);
  handle.addEventListener('pointercancel', onUp);

  // 최소/최대 범위를 벗어나지 않도록 보정
  window.addEventListener('resize', ()=>{
    if(window.innerWidth > 700) return;
    computeSnaps();
    const cur = sideEl.getBoundingClientRect().height;
    if(cur < snapMin || cur > snapMax){
      sideEl.style.transition = 'height .2s ease';
      sideEl.style.height = clamp(cur, snapMin, snapMax) + 'px';
    }
  });
})();


</script>
</body>
</html>
